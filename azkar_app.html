<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<title>الصلوات والأذكار</title>
<link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Noto+Naskh+Arabic:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --green-dark: #1a4a3a;
    --green-mid: #2d6b55;
    --green-light: #3d8b6e;
    --green-pale: #e8f5f0;
    --gold: #c9a84c;
    --gold-light: #e8c97a;
    --cream: #faf8f3;
    --text-dark: #1a1a1a;
    --text-mid: #3a3a3a;
    --text-light: #6a6a6a;
    --card-bg: #ffffff;
    --shadow: 0 4px 20px rgba(0,0,0,0.08);
    --shadow-hover: 0 8px 32px rgba(0,0,0,0.14);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

  body {
    font-family: 'Noto Naskh Arabic', 'Amiri', serif;
    background: var(--cream);
    min-height: 100vh;
    direction: rtl;
  }

  /* Header */
  .header {
    background: linear-gradient(135deg, var(--green-dark) 0%, var(--green-mid) 60%, var(--green-light) 100%);
    padding: 0;
    position: sticky;
    top: 0;
    z-index: 100;
    box-shadow: 0 2px 20px rgba(0,0,0,0.25);
  }

  .header-inner {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 14px 18px;
  }

  .header-title {
    color: #fff;
    font-family: 'Amiri', serif;
    font-size: 22px;
    font-weight: 700;
    text-shadow: 0 1px 4px rgba(0,0,0,0.3);
    flex: 1;
    text-align: center;
  }

  .header-subtitle {
    color: var(--gold-light);
    font-size: 12px;
    text-align: center;
    padding-bottom: 10px;
    letter-spacing: 0.5px;
  }

  /* Progress bar */
  .progress-bar-wrap {
    height: 4px;
    background: rgba(255,255,255,0.2);
  }
  .progress-bar-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--gold), var(--gold-light));
    transition: width 0.4s ease;
  }

  /* Category tabs */
  .tabs-wrapper {
    background: var(--green-dark);
    overflow-x: auto;
    -webkit-overflow-scrolling: touch;
    scrollbar-width: none;
  }
  .tabs-wrapper::-webkit-scrollbar { display: none; }

  .tabs {
    display: flex;
    gap: 0;
    min-width: max-content;
    padding: 0 8px;
  }

  .tab-btn {
    background: none;
    border: none;
    color: rgba(255,255,255,0.6);
    font-family: 'Noto Naskh Arabic', serif;
    font-size: 13px;
    padding: 10px 16px;
    cursor: pointer;
    white-space: nowrap;
    border-bottom: 3px solid transparent;
    transition: all 0.2s;
  }

  .tab-btn.active {
    color: var(--gold-light);
    border-bottom-color: var(--gold);
    font-weight: 600;
  }

  /* Stats bar */
  .stats-bar {
    background: var(--green-pale);
    padding: 10px 18px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    border-bottom: 1px solid rgba(0,0,0,0.06);
  }

  .stats-text {
    font-size: 13px;
    color: var(--green-mid);
    font-weight: 600;
  }

  .reset-btn {
    background: none;
    border: 1px solid var(--green-mid);
    color: var(--green-mid);
    padding: 4px 12px;
    border-radius: 20px;
    font-family: 'Noto Naskh Arabic', serif;
    font-size: 12px;
    cursor: pointer;
    transition: all 0.2s;
  }
  .reset-btn:active { background: var(--green-mid); color: #fff; }

  /* Main content */
  .content {
    padding: 16px;
    max-width: 680px;
    margin: 0 auto;
  }

  /* Zikr Card */
  .card {
    background: var(--card-bg);
    border-radius: 16px;
    margin-bottom: 16px;
    box-shadow: var(--shadow);
    overflow: hidden;
    transition: box-shadow 0.3s, transform 0.2s;
    border: 1px solid rgba(0,0,0,0.04);
  }

  .card.completed {
    border-color: rgba(61,139,110,0.3);
    background: linear-gradient(135deg, #fff 0%, #f0faf6 100%);
  }

  .card-body {
    padding: 20px 20px 16px;
  }

  .zikr-text {
    font-family: 'Amiri', serif;
    font-size: 21px;
    line-height: 2;
    color: var(--text-dark);
    text-align: center;
    margin-bottom: 14px;
  }

  .card-footer {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 12px 20px;
    background: rgba(0,0,0,0.02);
    border-top: 1px solid rgba(0,0,0,0.05);
  }

  .count-info {
    font-size: 13px;
    color: var(--text-light);
  }

  .count-info span {
    color: var(--green-mid);
    font-weight: 700;
    font-size: 15px;
  }

  /* Counter button */
  .counter-area {
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .counter-display {
    font-size: 18px;
    font-weight: 700;
    color: var(--green-dark);
    min-width: 28px;
    text-align: center;
  }

  .counter-btn {
    width: 52px;
    height: 52px;
    border-radius: 50%;
    border: none;
    background: linear-gradient(135deg, var(--green-mid), var(--green-dark));
    color: white;
    font-size: 24px;
    cursor: pointer;
    box-shadow: 0 4px 14px rgba(45,107,85,0.35);
    transition: transform 0.1s, box-shadow 0.1s;
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
    overflow: hidden;
  }

  .counter-btn:active {
    transform: scale(0.9);
    box-shadow: 0 2px 8px rgba(45,107,85,0.2);
  }

  .counter-btn.done {
    background: linear-gradient(135deg, #4caf50, #2e7d32);
    box-shadow: 0 4px 14px rgba(76,175,80,0.35);
  }

  .counter-btn .checkmark {
    display: none;
    font-size: 22px;
  }

  .counter-btn.done .plus { display: none; }
  .counter-btn.done .checkmark { display: block; }

  /* Completion badge */
  .done-badge {
    display: none;
    background: linear-gradient(135deg, #4caf50, #2e7d32);
    color: white;
    font-size: 12px;
    padding: 3px 10px;
    border-radius: 12px;
    font-weight: 600;
  }

  .card.completed .done-badge { display: inline-block; }

  /* Ripple effect */
  @keyframes ripple {
    to { transform: scale(4); opacity: 0; }
  }
  .ripple {
    position: absolute;
    border-radius: 50%;
    background: rgba(255,255,255,0.4);
    width: 20px; height: 20px;
    margin-left: -10px; margin-top: -10px;
    animation: ripple 0.5s linear;
    pointer-events: none;
  }

  /* Pulse on complete */
  @keyframes pulse-complete {
    0% { transform: scale(1); }
    50% { transform: scale(1.08); }
    100% { transform: scale(1); }
  }
  .card.just-completed { animation: pulse-complete 0.4s ease; }

  /* All done screen */
  .all-done {
    display: none;
    text-align: center;
    padding: 40px 20px;
  }
  .all-done.visible { display: block; }
  .all-done-icon { font-size: 60px; margin-bottom: 16px; }
  .all-done-title { font-family: 'Amiri', serif; font-size: 28px; color: var(--green-dark); margin-bottom: 8px; }
  .all-done-sub { color: var(--text-light); font-size: 15px; }

  /* Ornament divider */
  .ornament {
    text-align: center;
    color: var(--gold);
    font-size: 18px;
    padding: 4px 0 12px;
    opacity: 0.7;
  }

  /* Category title card */
  .category-header {
    text-align: center;
    padding: 10px 0 4px;
    margin-bottom: 4px;
  }
  .category-name {
    font-family: 'Amiri', serif;
    font-size: 20px;
    color: var(--green-dark);
    font-weight: 700;
  }
  .category-line {
    height: 2px;
    background: linear-gradient(90deg, transparent, var(--gold), transparent);
    margin: 8px auto 0;
    width: 60%;
  }

  /* Bottom safe area */
  .bottom-space { height: 40px; }

  /* Scrolled card animation */
  @keyframes fadeInUp {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
  }
  .card { animation: fadeInUp 0.3s ease both; }
</style>
</head>

</div>

<div class="bottom-space"></div>

// State
let counters = {};
let currentCat = null;

// Load state
function loadState() {
  const saved = localStorage.getItem('azkar_state_v1');
  if (saved) counters = JSON.parse(saved);
}

function saveState() {
  localStorage.setItem('azkar_state_v1', JSON.stringify(counters));
}

// Get unique categories
const categories = [...new Set(DATA.map(d => d.cat))];

// Build tabs
function buildTabs() {
  const tabsEl = document.getElementById('tabs');
  const allTab = document.createElement('button');
  allTab.className = 'tab-btn active';
  allTab.textContent = 'الكل';
  allTab.onclick = () => selectCat(null, allTab);
  tabsEl.appendChild(allTab);

  categories.forEach(cat => {
    const btn = document.createElement('button');
    btn.className = 'tab-btn';
    btn.textContent = cat;
    btn.onclick = () => selectCat(cat, btn);
    tabsEl.appendChild(btn);
  });
}

function selectCat(cat, btn) {
  currentCat = cat;
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  btn.scrollIntoView({behavior:'smooth', block:'nearest', inline:'center'});
  renderCards();
}

// Render cards
function renderCards() {
  const container = document.getElementById('cards');
  container.innerHTML = '';

  const filtered = currentCat ? DATA.filter(d => d.cat === currentCat) : DATA;
  let lastCat = null;

  filtered.forEach((item, idx) => {
    if (item.cat !== lastCat) {
      if (!currentCat) {
        const hdr = document.createElement('div');
        hdr.className = 'category-header';
        hdr.innerHTML = `<div class="category-name">✦ ${item.cat} ✦</div><div class="category-line"></div>`;
        container.appendChild(hdr);
      }
      lastCat = item.cat;
    }

    const cur = counters[item.id] || 0;
    const done = cur >= item.count;

    const card = document.createElement('div');
    card.className = 'card' + (done ? ' completed' : '');
    card.id = 'card_' + item.id;
    card.style.animationDelay = (idx * 0.04) + 's';

    const times = item.count === 1 ? 'مرة واحدة' : item.count === 3 ? 'ثلاث مرات' : item.count + ' مرات';

    card.innerHTML = `
      <div class="card-body">
        <div class="zikr-text">${item.zekr}</div>
      </div>
      <div class="card-footer">
        <div class="count-info">${times} &nbsp;|&nbsp; <span>${cur}/${item.count}</span></div>
        <div class="counter-area">
          <div class="done-badge">✓ تم</div>
          <div class="counter-display" id="disp_${item.id}">${cur}</div>
          <button class="counter-btn ${done ? 'done' : ''}" id="btn_${item.id}" onclick="tap('${item.id}', this)">
            <span class="plus">+</span>
            <span class="checkmark">✓</span>
          </button>
        </div>
      </div>`;

    container.appendChild(card);
  });

  updateStats();
}

function tap(id, btn) {
  const item = DATA.find(d => d.id === id);
  if (!item) return;

  const cur = counters[id] || 0;
  if (cur >= item.count) return;

  // Ripple
  const r = document.createElement('div');
  r.className = 'ripple';
  btn.appendChild(r);
  setTimeout(() => r.remove(), 500);

  counters[id] = cur + 1;
  saveState();

  const newCur = counters[id];
  const done = newCur >= item.count;

  // Update display
  const disp = document.getElementById('disp_' + id);
  if (disp) disp.textContent = newCur;

  // Update footer count
  const times = item.count === 1 ? 'مرة واحدة' : item.count === 3 ? 'ثلاث مرات' : item.count + ' مرات';
  const card = document.getElementById('card_' + id);
  const countInfo = card.querySelector('.count-info');
  countInfo.innerHTML = `${times} &nbsp;|&nbsp; <span>${newCur}/${item.count}</span>`;

  if (done) {
    btn.classList.add('done');
    card.classList.add('completed');
    card.classList.add('just-completed');
    setTimeout(() => card.classList.remove('just-completed'), 400);
    // Haptic if available
    if (navigator.vibrate) navigator.vibrate(30);
  }

  updateStats();
}

function updateStats() {
  const total = DATA.length;
  const done = DATA.filter(d => (counters[d.id] || 0) >= d.count).length;
  const pct = Math.round((done / total) * 100);

  document.getElementById('statsText').textContent = `${done} من ${total} ذكر (${pct}%)`;
  document.getElementById('progressBar').style.width = pct + '%';

  if (done === total) {
    document.getElementById('allDone').classList.add('visible');
  } else {
    document.getElementById('allDone').classList.remove('visible');
  }
}

function resetAll() {
  if (!confirm('هل تريد إعادة تعيين جميع الأذكار؟')) return;
  counters = {};
  saveState();
  renderCards();
}

// Init
loadState();
buildTabs();
renderCards();
</script>
